  text: 上清玉帝七聖玄紀回天九霄經既五玉帝七聖玄紀回天九霄上經乃上聖帝君以九玄建氣之始空靈分判二儀既彰九元合韻九帝命靈齊景霄館於是上聖攜契玉虛紫賓回駢丹霄瓊輪上登九層七映朱宫徘徊明霞之上蕭條九空之中天元冥滯三景合光流精曜虛八㑹四通交真齊契嘯詠太無玄始映朗天景敷陳河海靜波八風揚輪流煙蔚於龍軒浮景揚於九玄金仙秉鉞四司杖幡五帝靈官十億萬人飛麟羽騎僃衛天真西華玉女金晨靈童曜雲姿於瓊側含仙容於蘭房散靈香以却穢揚華精於拂塵遊龍交馳於紫館毒獸奮爪於玉關金翅撫翮於瓊林靈鶴飛吟於雲端西妃擊節天女羅錚龍吟虎嘯鸞儛鳯鳴四真合唱八音齊聲雲璈激朗傾駭三清飛歌玄奏廣樂虛𢌜流芬翳霞靈風散真華光交煥三燭合明是時髙聖太上大道君佩九色離羅之帔衣飛森霜珠之袍巾須㬰百變之冠帶晨光日鈴育延之劔豁落交帶玉璽鳯章流金耀虛七精激無乘碧霞九靈八景流雲之輿從飛仙羽蓋桑林千真紫虛之童三十萬人顯蓋九霞回天傾光天丁前驅六師厲鋒奔電揚精四明扶靈啓路五老通津飛旌瓊途流盻髙清上詣九層七映朱宫道君列座九帝齊歡三真合韻七聖同欣天音朗暢高聖歡焉玄心充於帝簡飛翰蔚乎慶煙亹舋神靈德虛體玄曜龍文於滄淵煥彩雲於九天濯髙貌於蘭玉發金精於瓊泉列七紀於上録明刻書於隱篇括致沈毫運轉滯輪採結五象𢹂集上真實髙上之垂化以敷教于羣方也於是七聖撰上玄之章集為靈文命龜母按筆太一拂筵天妃侍香玉華執巾丹書紫字刻於白銀隱起靈韻結於玉篇題以青録得道之名以付五老上真仙都左公藏於紫蘂玉笈封以啓命之章玉童玉女各三百人散花侍靈七聖各掌一通西龜定録東華校名請以五嶽群仙後學之人有奏簡三元奉録青宫一年七㨂列名上清者皆刻注於玄圖得為太平之上真此乃天誠玄暢於上聖明德一合於三元故太上告命記乎玉文玄契冥唱霄暉內鮮洞玄悠韻輪運應玄髙範超於三界丹景陵於上真尅得題於白簡結録字於青文冥圖髙妙非以簡札翰墨所能言宣粗記千分之一略標得真之遐迹𠇍回天九霄白簡青録上聖帝君受於九空結飛玄紫氣自然之字玄記後學得道之名靈音韻合玉朗禀真或以字體或以隱音上下四㑹皆表玄名空生刻書廣靈之堂舊文有十萬玉言字無正類韻無正音自非上聖莫能意通積七千年後題昆崘之室北洞之源字方一丈文蔚煥爛四合垂芒虛生菴藹若存若亡流光紫氣拂其穢金精冶錬瑩其文遂經纍劫字體鮮明至中皇元年九月七日七聖齊靈清齊長宫金青盟天𧵥誓告䖍奉受靈文髙上解其曲滯七聖通其妙音記為回天九霄得道之篇刻以白銀之簡結以飛青之文藏於雲錦之囊封以啓命之章付於五老仙都左公掌録瓊宫依四極明科萬劫一傳檢以四司之律罰以五帝神兵名參玄簡當得此文得者輕泄殃滅九族考纍七玄巳身亡命長責鬼官雖有玄名不得入仙七聖玄紀回天上文或以韻合或支類相參或上下四㑹以成字音或標其正諱或單復相兼皆出玄古洞之中髙聖撰集以明靈文後學之士名參其篇得受寶訣自然上仙然有六合復有七傷寶之則合忽之則亡有分之身勤加精誠長齊靈㞯遠尋幽山燒香行禮晨夕誦經弃諸雜想心注太真剋得玄降白日飛騰凡後學之士或名不書玄簡而僃得寶經者皆以巳身有宿世重德豐柯垂廕度逮其身或身冥有功志分出羣單心苦尚上感玉皇四極所奏五嶽記名致遇經師得受寶文如使精勤不犯七傷則使真人下降授其真文注上玄紀亦七年成仙也諸得見上聖玄紀之文者皆以玄名有飛仙之分刻書於來生之象逆注玄虛之篇既禀人道青宫㨂名四司所保五帝所詮玉虛結藏紫絡植根骨有竒光舉形合仙四司潜降隂受寶文太一定籍司命與年魂固魄安六胃結真萬神總具剋成上仙修行七年自當靈降乘空飛騰髙聖帝君曰凡得七聖玄紀回天九霄雖未升騰皆青宫㨂名告下五嶽付諸靈山河海司官防衛其身玉童玉女各十二人侍衛靈文奉經行真此玄挺應㑹理㑹自然上聖皆以逆注真録位准仙鄉須以道僃四真詣房降下雲輿令白日登晨俯仰之格隨品進仙此道遐眇非以常學所可窺聞奉者寶祕愼勿妄宣髙聖六合隱存定簡記仙上法髙聖帝君曰正月一日三月三日五月五日七月七日九月九日十一月十一日此一年六日是天德值合之時七聖定簡五帝記名西龜勒録東華結篇當此之日天元合慶四司羅兵髙上顯蓋玉虛回駢九帝束帶七聖齊靈億真萬仙皆浮位金庭三晨翼軒七元煥明天地潔落十界肅清九天帝王遣監真使者髙上七聖遣定録左仙西龜王母命五老仙伯西皓中真東華青童遣領仙玉郎各部飛仙遊輪羽騎周行十天五嶽名山隂察洞元已得道者遊散仙官及後學之人名參簡録身未升騰或玄紀無名而苦行修勤情冠玉虛上感玉皇諸以學身當此之日清齊燒香弃諸異想願合天心存思苦念修行靈文為五帝所舉即勒注白簡素録記名即遣四極下降授以上真七年當得乘空駕虛上登霄晨當此之日如有輕慢天寶漏泄玄文身犯七傷為四司所糾有白簡之名者皆勒落青録注還鬼官宿無簡記因緣遇經即命五帝罰以神兵收捕七祖充責河源死生之考如日之明故學在精心不必於白簡玄名也唯密唯苦便獲神仙髙聖玉帝道君曰欲書白簡玄紀之名身登玉清上宫之法當以正月一日上合之時沐浴清齊平旦入室燒香北向九拜朝禮玉帝畢北向平坐叩齒九通思齊室之內有青雲蓊鬱周匝一室存五老仙伯在青雲之中披飛青羽帔冠通天玉冠手執青文之録思領仙玉郎著雲錦之袍冠七寶玉冠手執白銀之簡思見二真為我記名於簡之上結録於青雲之編以我簡録付監真使者定録左仙上剌九天帝王七聖几下簡録定名五老仙伯領仙玉郎化入我身明堂之中便祝曰上合之日天元肅清髙上顯蓋玉帝臨庭九真命虛七聖齊靈上校玄記白簡之名勒注元録落死刻生西龜結篇保仙華青上受冠帶煥落五形給我羽服降我緑軿得乘飛霄上登紫瓊三景合光七元同明永保二儀天地長并畢又七拜禮七聖咽七氣止此髙聖經録剌簡六合之法行之七年先無玄名者亦得勒注於玄紀三元下降四極啓靈自然洞逹得飛行太清也髙聖帝君曰欲記名玄簡騰身上清之法當以三月三日上合之時沐浴清齊食時入室燒香北向九拜朝禮玉天畢北向叩齒十二通思齊室之內有紫雲鬱㪍周匝一室之內存五老仙伯在紫雲之中披飛青羽帔冠通天玉冠手執青文之録思領仙玉郎著雲錦之袍冠七寶玉冠手執白録之簡思見二真為我記名於白簡之上結録於青文之篇以我簡録付監真使者定録左仙上剌九天帝王七聖几下簡録定名五老仙伯領仙玉郎化入我身洞房之中便呪曰天元慶吉上合六陳九帝命靈七聖敷真空玄記録東華結篇名勒帝簡永保上仙音韻相和我體自然紫胞玉秀瓊琅內鮮面彩金暉骨化如銀竒毛異色上下匝纏玄降九霄回天紫軒六領五龍飛升帝晨三元合慶得如所言畢又七拜禮七聖咽七氣止行之七年真人見形自注簡録降致三元乘空步虛升行上清髙聖帝曰欲刻石玄紀回天九霄之法當以五月五日上合之時沐浴清齊正中入室燒香北向九拜禮玉天畢北向叩齒十二通思齊室之內中有丹雲煥爛於一室之內存五老仙伯在丹雲之中披飛青之帔冠通天玉冠手執青文之録思領仙玉郎著雲錦之袍冠七寶玉冠手執白銀之簡思見二真為我記名於白簡之上結録於青文之編以我簡録付監真使者定録左仙上剌九天帝王七聖几下簡録定名五老仙伯領仙玉郎化入我身絳宫之中便呪曰朱明南丹慶合上陽天元交㑹六願內昌九真七聖齊靈瓊堂上剌玄簡結録西音刻書正音明逹四通丹雲回霄來降我房飛青羽儀翼翼光光左䇿朱鳯右控遊龍六轡同舉超登華堂五老𢹂契四極齊𩀱長保玄暉日月同容畢又七拜禮七聖咽七氣止行之七年則玄紀得道之名定於上宫回映升入無形髙聖帝君曰欲記名西龜之山騰形七映之房當以七月七日上合之時沐浴清齊脯時入室燒香北向九拜朝禮玉天畢北向叩齒十二通思齊室之中有白素之雲虛在蓊藹滿匝一室存五老仙伯在素雲之中披飛青之帔冠通天玉冠手執青文之録思領仙玉郎著雲錦之袍冠七寶玉冠手執白銀之簡思見二真為我記名於白簡之上結録於青文之編以我簡録付監真使者定録左仙上刺九天帝王七聖几下簡録定名五老仙伯領仙玉郎化為我身太素宫中便祝曰天慶普降上合萬神太白記名東華刻篇結以青録簡以白銀四韻合一齊音成真髙聖玄授以度我身二氣下鎮回天九煙化為仙伯玉郎并真八景𢹂契上造帝晨朝禮上聖福慶九纏長保三光天地同年畢又七拜禮七聖咽七氣止行此之道七年則龜母注籙東華記名三元下降升到紫庭髙聖帝君曰欲刻名於金闕之宫騰身九霄之上當以九月九日上合之時沐浴清齊日入之後入室燒香北向九拜朝禮玉天畢北向叩齒十二通思齊室之中有黃雲鬱勃滿室存五老仙伯在黃雲之中披飛青之帔冠通天玉冠手執青文之録思領仙玉郎著黃錦之袍冠七寶玉冠手執白銀之簡思見二真為我記名於白簡之上結録於青文之編以我簡録付監真使者定録左仙上剌九天帝王七聖几下簡録定名五老仙伯領仙玉郎化入我身黃庭之中便祝曰上合啓晨六慶敷密九真鑑映七聖命日天仙定録五老刻札玄紀我名得參羣匹回天九霄下降我室啓我自然錬我形質反華停年金容充溢得乘飛輿上升帝一畢又七拜朝七聖咽七氣止行此之道則五老刻名於金闕三元降授於紫軿七年乘空而飛上升玉帝之庭髙聖帝君曰欲書名青華之宫列記諸方之府騰身九霄之上逍遙入於大有當以十一月十一日上合之時沐浴清齊子時入室燒香北向九拜朝禮玉天畢北向叩齒十二通思齊室之中有五色之雲蓊藹一室之內思五老仙伯在五色雲中披飛青之帔冠通天玉冠手執青文之録思領仙玉郎著雲錦之袍七寶玉冠手執白銀之簡思見二真為我記名於白簡之上結録於青文之編以我簡録付監真使者定録左仙上刺九天帝玉七聖几下簡録定名五老仙伯領仙玉郎化入我身命門之中便祝曰天元大合上慶普𨺚三元歡恱九帝齊容髙聖監靈萬仙咸恭五帝定録四司衛房刻名玉簡列記上宫玄上所祐我身入空上變下化七十四方逍遙靈館晏轡華堂永保天地與劫俱終七元同根二暉齊光六合五𩓑我為仙王畢又七拜禮七聖咽七氣止行此之道則東華刻名於諸方五老記名於三元五帝君右別四真降房七年飛行上升帝堂髙聖帝君曰此六合之時天真刻簡定録之日下諸名山四司五帝揀校玄名得在玄紀之中皆逆注其名位准仙卿依其合日行禮燒香𩓑念存祝上感神真七年太帝命靈四極真人下降兆身授兆真文寶訣白日登空也髙聖玄紀得道隱名內文上篇髙聖玉帝君列玄紀上篇曰
