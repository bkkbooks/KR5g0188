  text: 上清玉帝七聖玄紀廻天九霄經旣五玉帝七聖玄紀廻天九霄上經乃上聖帝君以九玄建炁之始空靈分判二儀旣彰九元合韻九帝命靈齊景霄館於是上聖攜契玉虚紫賓廻駢丹霄瓊輪上豋九層七暎朱宫徘徊明霞之上蕭條九空之中天元冥滯三景合光流精曜虚八㑹四通交眞齊契嘯詠太無玄始暎朗天景敷陳河海静波八風颺輪流煙蔚於龍軒浮景揚於九玄金仙秉鉞四司杖幡五帝靈官十億萬人飛麟羽騎僃衞天眞西華玉女金晨靈童曜雲姿於瓊側含仙容於蘭房散靈香以却穢揚華精於拂塵遊龍交馳於紫館毒獸奮爪於玉關金翅撫翮於瓊林靈鶴飛吟於雲端西妃擊節天女羅錚龍吟虎嘯鸞儛鳯鳴四眞合唱八音齊聲雲璈激朗傾駭三清飛歌玄奏廣樂虚𢌜流芬翳霞靈風散眞華光交煥三燭合明是時髙聖太上大道君佩九色離羅之帔衣飛森霜珠之袍巾須㬰百變之冠帶晨光日鈴育延之劔豁落交帶玉璽鳯章流金耀虚七精激无乗碧霞九靈八景流雲之輿從飛仙羽蓋桑林千眞紫虚之童三十萬人顯蓋九霞廻天傾光天丁前駈六師厲鋒奔電揚精四明扶靈啓路五老通津飛旌瓊途流盻髙清上詣九層七暎朱宫道君列座九帝齊歡三眞合韻七聖同欣天音朗暢高聖歡焉玄心充於帝簡飛翰蔚乎慶煙亹舋神靈德虚体玄曜龍文於滄淵煥彩雲於九天濯髙貌於蘭玉發金精於瓊泉列七紀於上録明刻書於隱篇括致沈毫運轉滯輪採結五象𢹂集上眞寔髙上之垂化以敷敎于羣方也於是七聖撰上玄之章集爲靈文命龜母按筆太一拂筵天妃侍香玉華執巾丹書紫字刻於白銀隱起靈韻結於玉篇題以青録得道之名以付五老上眞仙都左公藏於紫蘂玉笈封以啓命之章玉童玉女各三百人散花侍靈七聖各掌一通西龜定録東華校名請以五嶽群仙後學之人有奏簡三元奉録青宫一年七㨂列名上清者皆刻注於玄圖得爲太平之上眞此乃天誠玄暢於上聖明德一合於三元故太上告命記乎玉文玄契冥唱霄暉内鮮洞玄悠韻輪運應玄髙範超於三界丹景陵於上眞尅得題於白簡結録字於青文冥圖髙妙非以簡札翰墨所能言宣粗記千分之一略標得眞之遐迹𠇍廻天九霄白簡青録上聖帝君受於九空結飛玄紫炁自然之字玄記後學得道之名靈音韻合玉朗禀眞或以字體或以隱音上下四㑹皆表玄名空生刻書廣靈之堂舊文有十萬玉言字无正類韻无正音自非上聖莫能意通積七千年後題崐崘之室北洞之源字方一丈文蔚煥爛四合垂芒虚生菴藹若存若亡流光紫炁拂其穢金精冶錬瑩其文遂經累劫字體鮮明至中皇元年九月七日七聖齊靈清齋長宫金青盟天𧵥誓告䖍奉受靈文髙上解其曲滯七聖通其妙音記爲廻天九霄得道之篇刻以白銀之簡結以飛青之文藏於雲錦之囊封以啓命之章付於五老仙都左公掌録瓊宫依四極明科萬劫一傳檢以四司之律罰以五帝神兵名參玄簡當得此文得者輕洩殃滅九族考累七玄巳身亡命長責鬼官雖有玄名不得入仙七聖玄紀廻天上文或以韻合或支類相叅或上下四㑹以成字音或標其正諱或單複相兼皆出玄古洞之中髙聖撰集以明靈文後學之士名叅其篇得受寳訣自然上仙然有六合復有七傷寳之則合忽之則亡有分之身勤加精誠長齋靈㞯遠尋幽山燒香行禮晨夕誦經弃諸雜想心注太眞剋得玄降白日飛騰凡後學之士或名不書玄簡而僃得寳經者皆以巳身有宿世重德豐柯垂廕度逮其身或身冥有功志分出羣單心苦尚上感玉皇四極所奏五嶽記名致遇經師得受寳文如使精勤不犯七傷則使眞人下降授其眞文注上玄紀亦七年成仙也諸得見上聖玄紀之文者皆以玄名有飛仙之分刻書於來生之象逆注玄虚之篇旣禀人道青宫㨂名四司所保五帝所詮玉虚結藏紫絡植根骨有竒光舉形合仙四司潜降隂受寳文太一定籍司命與年魂固魄安六胃結眞萬神總具剋成上仙修行七年自當靈降乗空飛騰髙聖帝君曰凡得七聖玄紀廻天九霄雖未昇騰皆青宫㨂名告下五嶽付諸靈山河海司官防衛其身玉童玉女各十二人侍衞靈文奉經行眞此玄挺應㑹理㑹自然上聖皆以逆注眞録位准仙郷須以道僃四眞詣房降下雲輿令白日登晨俯仰之格隨品進仙此道遐眇非以常學所可窺聞奉者寳祕愼勿妄宣髙聖六合隱存定簡記仙上法髙聖帝君曰正月一日三月三日五月五日七月七日九月九日十一月十一日此一年六日是天德值合之時七聖定簡五帝記名西龜勒録東華結篇當此之日天元合慶四司羅兵髙上顯蓋玉虚廻駢九帝束帶七聖齊靈億眞萬仙皆浮位金庭三晨翼軒七元煥明天地潔落十界肅清九天帝王遣監眞使者髙上七聖遣定録左仙西龜王母命五老仙伯西皓中眞東華青童遣領仙玉郎各部飛仙遊輪羽騎周行十天五嶽名山隂察洞元已得道者遊散仙官及後學之人名叅簡録身未昇騰或玄紀无名而苦行修勤情冠玉虚上感玉皇諸以學身當此之日清齋燒香弃諸異想願合天心存思苦念修行靈文爲五帝所舉即勒注白簡素録記名即遣四極下降授以上眞七年當得乗空駕虚上登霄晨當此之日如有輕慢天寳漏泄玄文身犯七傷爲四司所糺有白簡之名者皆勒落青録注還鬼官宿无簡記因縁遇經即命五帝罰以神兵收捕七祖充責河源死生之考如日之明故學在精心不必於白簡玄名也唯宻唯苦便獲神仙髙聖玉帝道君曰欲書白簡玄紀之名身登玉清上宫之法當以正月一日上合之時沐浴清齋平旦入室燒香北向九拜朝禮玉帝畢北向平坐叩齒九通思齋室之内有青雲蓊鬱周帀一室存五老仙伯在青雲之中披飛青羽帔冠通天玉冠手執青文之録思領仙玉郎著雲錦之袍冠七寳玉冠手執白銀之簡思見二眞爲我記名於簡之上結録於青雲之編以我簡録付監眞使者定録左仙上剌九天帝王七聖几下簡録定名五老仙伯領仙玉郎化入我身明堂之中便祝曰上合之日天元肅清髙上顯蓋玉帝臨庭九眞命虚七聖齊靈上校玄記白簡之名勒注元録落死刻生西龜結篇保仙華青上受冠帶煥落五形給我羽服降我緑軿得乗飛霄上豋紫瓊三景合光七元同明永保二儀天地長并畢又七拜禮七聖咽七炁止此髙聖經録剌簡六合之法行之七年先无玄名者亦得勒注於玄紀三元下降四極啓靈自然洞逹得飛行太清也髙聖帝君曰欲記名玄簡騰身上清之法當以三月三日上合之時沐浴清齋食時入室燒香北向九拜朝禮玉天畢北向叩齒十二通思齋室之内有紫雲鬱㪍周帀一室之内存五老仙伯在紫雲之中披飛青羽帔冠通天玉冠手執青文之録思領仙玉郎著雲錦之袍冠七寳玉冠手執白録之簡思見二眞爲我記名於白簡之上結録於青文之篇以我簡録付監眞使者定録左仙上剌九天帝王七聖几下簡録定名五老仙伯領仙玉郎化入我身洞房之中便呪曰天元慶吉上合六陳九帝命靈七聖敷眞空玄記録東華結篇名勒帝簡永保上仙音韻相和我體自然紫胞玉秀瓊琅内鮮面彩金暉骨化如銀竒毛異色上下匝纏玄降九霄廻天紫軒六領五龍飛昇帝晨三元合慶得如所言畢又七拜禮七聖咽七炁止行之七年眞人見形自注簡録降致三元乗空歩虚昇行上清髙聖帝曰欲刻石玄紀廻天九霄之法當以五月五日上合之時沐浴清齋正中入室燒香北向九拜禮玉天畢北向叩齒十二通思齋室之内中有丹雲煥爛於一室之内存五老仙伯在丹雲之中披飛青之帔冠通天玉冠手執青文之録思領仙玉郎着雲錦之袍冠七寳玉冠手執白銀之簡思見二眞爲我記名於白簡之上結録於青文之編以我簡録付監眞使者定録左仙上剌九天帝王七聖几下簡録定名五老仙伯領仙玉郎化入我身絳宫之中便呪曰朱明南丹慶合上陽天元交㑹六願内昌九眞七聖齊靈瓊堂上剌玄簡結録西音刻書正音明逹四通丹雲廻霄來降我房飛青羽儀翼翼光光左䇿朱鳯右控遊龍六轡同舉超登華堂五老𢹂契四極齊𩀱長保玄暉日月同容畢又七拜禮七聖咽七炁止行之七年則玄紀得道之名定於上宫廻暎昇入无形髙聖帝君曰欲記名西龜之山騰形七暎之房當以七月七日上合之時沐浴清齋脯時入室燒香北向九拜朝禮玉天畢北向叩齒十二通思齋室之中有白素之雲虚在蓊藹滿帀一室存五老仙伯在素雲之中披飛青之帔冠通天玉冠手執青文之録思領仙玉郎着雲錦之袍冠七寳玉冠手執白銀之簡思見二眞爲我記名於白簡之上結録於青文之編以我簡録付監眞使者定録左仙上刺九天帝王七聖几下簡録定名五老仙伯領仙玉郎化爲我身太素宫中便祝曰天慶普降上合萬神太白記名東華刻篇結以青録簡以白銀四韻合一齊音成眞髙聖玄授以度我身二氣下鎭廻天九煙化爲仙伯玉郎并眞八景𢹂契上造帝晨朝禮上聖福慶九纏長保三光天地同年畢又七拜禮七聖咽七炁止行此之道七年則龜母注籙東華記名三元下降昇到紫庭髙聖帝君曰欲刻名於金闕之宫騰身九霄之上當以九月九日上合之時沐浴清齋日入之後入室燒香北向九拜朝禮玉天畢北向叩齒十二通思齋室之中有黄雲鬱勃滿室存五老仙伯在黄雲之中披飛青之帔冠通天玉冠手執青文之録思領仙玉郎着黄錦之袍冠七寳玉冠手執白銀之簡思見二眞爲我記名於白簡之上結録於青文之編以我簡録付監眞使者定録左仙上剌九天帝王七聖几下簡録定名五老仙伯領仙玉郎化入我身黄庭之中便祝曰上合啓晨六慶敷宻九眞鑑暎七聖命日天仙定録五老刻札玄紀我名得叅羣匹廻天九霄下降我室啓我自然錬我形質反華停年金容充溢得乗飛輿上昇帝一畢又七拜朝七聖咽七炁止行此之道則五老刻名於金闕三元降授於紫軿七年乗空而飛上昇玉帝之庭髙聖帝君曰欲書名青華之宫列記諸方之府騰身九霄之上逍遥入於大有當以十一月十一日上合之時沐浴清齋子時入室燒香北向九拜朝禮玉天畢北向叩齒十二通思齋室之中有五色之雲蓊藹一室之内思五老仙伯在五色雲中披飛青之帔冠通天玉冠手執青文之録思領仙玉郎着雲錦之袍七寳玉冠手執白銀之簡思見二眞爲我記名於白簡之上結録於青文之編以我簡録付監眞使者定録左仙上刺九天帝玉七聖几下簡録定名五老仙伯領仙玉郎化入我身命門之中便祝曰天元大合上慶普𨺚三元歡恱九帝齊容髙聖監靈萬仙咸恭五帝定録四司衛房刻名玉簡列記上宫玄上所祐我身入空上變下化七十四方逍遥靈館晏轡華堂永保天地與劫俱終七元同根二暉齊光六合五𩓑我爲仙王畢又七拜禮七聖咽七氣止行此之道則東華刻名於諸方五老記名於三元五帝君右別四眞降房七年飛行上昇帝堂髙聖帝君曰此六合之時天眞刻簡定録之日下諸名山四司五帝揀校玄名得在玄紀之中皆逆注其名位准仙卿依其合日行禮燒香𩓑念存祝上感神眞七年太帝命靈四極眞人下降兆身授兆眞文寶訣白日登空也髙聖玄紀得道隱名内文上篇髙聖玉帝君列玄紀上篇曰
