body:
  text: 清容內結華外鮮長燈朗室永垂天晨君西遊披日門唯見北鎮對天關堂有紫賔玉賢君三五居上夾一元立求日精止月魂苟與契合合玄文芝英浩浩草穢紛凝霜下激萎華繁二十七數音合圎𩀱日沓光曜天端赤龍御世此道分若明其訣升九雲四極下降授靈篇給以羽服飛青裙乘空䇿虛造金門此道密妙慎勿傳殃滅汝身及七玄後學有分審此言髙聖太上大道君列玄紀上篇曰有日垂光照人山長彌浩浩與天連髙峊植夌結華鮮八月羽單翮凌天已與言韻有八人二八人與火合煙人之立左恭不臣了無宗緒一為親二口兩分日并身靈泉左流灌米田吕伏岩下至強秦雲中之子巾素巾玉璫合寶青華裙得道不久承唐年青氣行治吾道宣有得其訣奉聖君乘空駕虛上九玄自知玄記白簡文其法密寶見者仙上聖紫清太素三元君列玄紀上篇曰三五之末至道沈門內有人名觀音閉口不言歷古今空洞之中穴何深工非神匠帶人心單車失迪登山林冥木茂盛鬱陽森我有何求山下吟一土參玄據宫商披褐詠經理靈襟白玉峩峩陵雲岑十斗歷數力相尋鳴齒召神合玉音與月相望期上金皇上八真來相憑白帝行氣道當新名書紫簡得其篇西龜定録位真人逆注玄紀應自然慎勿妄泄道泯泯所謂法鼓㑹羣神上聖白玉龜臺九靈太真西王母列玄紀上篇曰玄古之上引弓長立人在左專為強白簡玄紀草飛翔十口學道並無糧山下餌豆過十昌三力同心君牧羊日月乘焉四體強一士二刀齊四鄉千子合真八來迎北極女子頭䢖巾與月結期生雲英龍飛之後道當行要須玄記𥙷上宫名參青録升西堂自得其訣乘空翔遨遊八極樂未央子有此文深祕藏四極試觀題諸方逆注玄簡東華宫不出七年約來從上聖中央黃老君列玄記上篇曰上元有真一氣玄守之者何月中人了不學他遇一賢誓信奉受受要言迅轡九霄卒獲真朱玉含寶華光鮮緑草鬱鬱坐丹田日精帶中赤石邉昌元之先升三天金王木廢選此人各自勤心尋道根尅見玄紀及靈篇得書白簡青録文四極下降授子真乘空飛行升九玄輕傳妄泄入幽泉長充鬼役不得仙上聖扶桑太帝君列玄紀上篇曰紫虛玉館乘素絲唯有皇人心相期周之後氏田中兒月照幽谷上髙臺歷觀八極見赤精洞念幽微二人并俯仰尋真力手輕得道寶訣首體生北有上真南方平安在玄闕期髙靈十子八實輔吾經當須金後道治清學者勤念尋其名尅書玉簡致紫軿三元詣房授真經曉知玄紀升三清飛行玄虛登帝庭深藏寶密尅得仙妄泄輕傳滅𠇍形死充下鬼畢劫齡後聖金闕帝君列玄紀上篇曰九一之字難可聽在阜之南易為名竟須九錬與金精圎口之中光延明二日守元見真形碧石落落人中生耳下帶玉口詠經緑草鬱鬱冬夏榮上素絲結三心并皇老光光耀日庭髙上真人叩玉瓊至於萬劫乃成嬰良木重森植秀齡兩輿羽合灑八冥六十玉女侍汝形奎宿入吕輔刀兵赤兒出遊六國平四方之數萬神靈刻書玉簡補上清壬辰之後道治明必有先智得此經當為人宗簡勤精十十五五結弟兄登山告盟列華清得有此應注玄名三元下降致緑軿弓口出治侍華庭當此之時樂未央髙聖帝君曰髙上受九玄之氣布位萬真三十九帝二十四王皇以部上清之宫分氣散靈以總兆民玄空之內送注白簡二十四萬人應得道者後學有見其文名參其韻尅成上仙至壬辰之後至道當行扶桑大帝當以其時遣四極真人遊盼下世歷諸名山六之中部五帝神官㨂校玄名有合真之人當授寶訣使為師宗採擇骨性有名之身登山告盟列奏青宫結帶授言須太平卯木宫口出治當解結孟津奏迎聖君於上清宫自元玄名不得參其上篇有得之者便以白簡定數勤修苦行長齊念真七年自當有靈瑞下降悟子神真也便得為學者之師宗也自元此挺弗得窺看輕泄妄宣七祖充責登履刀山已身亡命長謝河源不得入仙髙聖隱書金名玉字內文髙聖帝君曰金閣有隱書玉名有知者飛升金闕騰景上清佩之者則金閣刻書玉簡注名四瀆五嶽靈仙營衛送迎九年得乘飛雲役使玉女十二人丹書白繒髙聖帝君曰上清金書玉録上文有知者飛升上清位齊四真佩之者則上清刻書金簡注名神仙告下五嶽以仙官扶迎青書白繒髙聖帝君曰太極白簡青文有知者飛升太極官騰景金闕之中佩之者太極刻書於簡文注名於神仙四極營衛九年飛行青書白繒髙聖帝君曰方諸玄素紫名隱文太極白簡青文有知者飛升方諸宫佩之者則方諸刻書玄素紫名九年飛行神仙衛迎五嶽記名青書白繒髙聖帝君曰太清玉籍絳名隱文有知者飛行太清騰景瓊宫佩之者太清刻書絳名於玉籍九年通神飛行給玉童十二人丹書白繒髙聖帝君曰太素瓊簡金名隱文有知者飛升太素之宫上朝三元君得佩之者太素刻書瓊簡九年降致飛雲白日升天黃書白繒髙聖帝君曰南極有丹文紫録上文有知者白日飛升謁南極上元得佩之者則南極注名於紫録九年三元君下降授子真書白日升天丹書白繒髙聖帝君曰玄宫上元青金赤書隱文有知者飛升雲宫騰景上清佩之者目見上元真形九年降兆之房授兆真書即得神仙也青書白繒髙聖帝君曰玄都丹臺白玉金字隱文有知者白日飛升玄都佩之者刻書丹臺之名九年乘空景而行久久神仙黃書白繒髙聖帝君曰三元官琳札青書隱文有知者白日升天上拜三元君得佩之者刻名於瓊琳之札九年三元詣房授兆真文神仙飛行青書白繒髙聖帝君曰玄斗之中玄名録籍隱文知者得升玄斗之中飛行上清之宫刻書玄斗之名九年神人下降授兆真書行之神仙黑書白繒髙聖帝君曰五嶽有丹書瓊簡紫録之名知者白日升天飛行五嶽仙官防衛兆身五帝刻名於五嶽之簡九年乘空飛行上升玄宫青書白繒諸隱文皆玄古空同之書以表得道合仙之人有得見此文皆四極所監五帝所舉萬靈侍衛羣真敬迎有知其音飛行上清三元下降與兆同升得佩其文刻書玄圖給玉童玉女各十二人遊行五嶽履涉名山十界稽首萬仙來朝九年自當洞明其音與神人交言乘雲步虛飛行太空髙聖隱存刻書瓊文簡録上法髙聖帝君曰欲書名金闕玉録飛行上清當以正月一日丹書金闕隱書玉名十音向寅上服之叩齒十二通微祝曰天恢氣精五晨絡形禀統玄古金闕記名上元合慶天津敷榮服御隱文身飛王清洞曉自然與帝合靈畢咽氣九過上九拜朝金關帝尊便止行之九年金闕書名刻字玉篇自然明解天書與帝合并也髙聖帝君曰欲書名上清金書玉籙之文飛行上清之宫者當以二月二日青書金簡玉録十音白紙上向東服之叩齒九通微祝曰胤元玄靈承古法虛骨象應圖玉録金書河魁絡已五神煥舒次慶二元玄津降廬名題上清得乘飛輿永享無窮福慶有餘畢咽氣八過向東八拜朝上清之宫八帝尊神止行之九年則上清刻書玉録降飛雲丹輿上升玉清之宫髙聖帝君曰欲書名太極白簡青文飛行太極之宫者當以三月三日青書白簡青文十音向辰上服之叩齒十二通微祝曰三合成契玄綱總辰五體法圖玄簡青文名題太極位准上仙三元已布六氣敷陳金音玉字我啓自然得乘飛景上造帝晨畢咽氣十過向辰四拜朝太極四真止行此九年太極書名四真下降授兆真文自解明音飛行上清也髙聖帝君曰欲書名方諸玄素紫名飛騰東華之宫者當以四月四日素書玄素紫名十音向已上服之叩齒九通微祝曰九玄散靈七聖翼讃八道暉光流精朗煥天元羅張玄圖啓韻名題方諸飛升玄漢畢咽氣九過向已上九拜朝青宫方諸大神止行此九年方諸刻名真人下降授兆真文明解聰慧逆覩未然乘空飛行上升青宫髙聖帝君曰欲書名太清玉籍絳名隱文飛騰太清之中者當以五月五日丹書玉籍絳名十音向南服之叩齒八通微祝曰離建玄綱分位九宫施元散靈總監八方玉籍隱書玄圖大空帝尊曲映我位仙王得乘飛景上升紫房長保天地日月齊光畢咽氣九過向南再拜朝南極上元君行此九年太清刻書玉籍絳名九孔洞逹察覩幽冥真人下降與神交言髙聖帝君曰欲書名太素瓊簡金名飛行太素上宫者當此六月六日黃書瓊簡金名十音向未上服之叩齒八通微祝曰素靈皓華四真布精玄圖瓊文金字紫名刻書太素四會洞生三元交慶我禀太真得乘八景丹轅緑軿逍遙無崖上造太清畢咽氣八過向未八拜朝太素止行此九年則刻名瓊簡得給飛行之章乘空而飛上造太素宫髙聖帝君曰欲書名南極丹文紫録飛行南極上宫者當以七月七日丹書紫録十音向申上服之叩齒三通微祝曰丹文結録紫元玄文華光交灑上真敷雲散景曲鑒我道獨分翠羽飛章丹錦緑裙乘景虛行飛入洞門𢹂英九老八真齊羣畢咽氣八過向申八拜朝南極上元八帝太真畢行此九年南極刻書丹文紫録之文三元下降授兆真音乘空而飛上升南極之宫髙聖帝君曰欲書名玄宫上元青金赤書隱文飛行玄宫之上者當以八月八日青書青金赤書十音向西方而服之叩齒九通微祝曰天回氣布四綱正方三五結絡九道成叢青金赤書文耀太空玄圖乘音八逹四通洞得幽微朗覩無窮得朝三元進登紫房出入三清長保華光畢咽氣六過向西六拜朝玄宫上真止行此九年則上元刻書青金赤書隱篇自然明解曉究幽窮與神交通乘虛飛行上升上清髙聖帝君曰欲書名玄都丹臺白玉金字飛行玄都之上者當以九月九日黃書白玉金字十音向戌上服之叩齒三通微祝曰天道順回玄斗運精三元應機交㑹啓靈玄圖隱録丹臺金名白玉峨峨我道以明八㑹四通上下洞清神氣下降六府結靈得乘飛霄丹轅紫軿𢹂契四真上造華青畢咽氣九過止向戍再拜朝玄都上真帝尊止行此九年則玄都刻名於丹臺九老下降兆房授兆真文神人交言白日升天髙聖帝君曰欲書名三元宫琳札青書隱文飛升三元之宫者當以十月十日青書琳札青書十音向西北而服之叩齒三通微祝曰九氣鬱靈三道回周皇上置位玄圖應符七聖曲映已鑒我𨈬名書琳札位准玄州控轡特升上到雲衢三晨齊景八真結儔與天相保永無終休畢咽氣三過向西北三拜朝三元止行此九年則三元刻書琳札之名下降兆房授兆真文審察幽微飛行雲宫髙聖帝君曰欲書名玄斗之中玄名録籍飛行上宫者當以十一月十一日墨書玄名録籍十音向正北服之叩齒十二通微祝曰玄斗運氣回綱整辰八氣應靈玄圖記仙題名玉札上合天真斗中華蓋七元大神降我妙道啓我自然令我飛騰上之帝晨畢咽氣七過向正北七拜朝斗中七真止行此道九年七真刻書玄斗録籍真人下降授兆真文自然洞逹曉知自然乘空飛行上升斗晨髙聖帝君曰欲書名五嶽丹書瓊簡紫録之名飛行五嶽之法即當十二月十二日青書瓊簡紫録十音向東北服之叩齒三通微祝曰五嶽丹房羣仙所宗帝靈刻書云古上皇玄圖紫名定録五宫我禀自然法景太空服御靈音洞覩八方上宴玄都出有入無逍遙太極無終無窮五嶽上真結我為朋降致飛霞升入帝房畢咽氣五過止向東北五拜朝五帝靈尊畢行此九年則五帝刻書玄名於五嶽瓊簡紫録之文五嶽仙官侍衛兆身降致飛與運兆之身遊宴五嶽之宫右髙聖書名玄圖服御靈音自然上法後學得行此道則有玄名於上清刻玉簡於華官五帝扶護仙官敬迎身發紫氣項有圎光洞映無幽坐覩自然九年靈降三元詣房靈輿羽蓋迎兆之身飛行玄虛位加仙卿密則靈降泄則滅身妄行不真七祖充責萬劫不原已身長命永無復仙有志之士慎密此文髙聖帝君曰後學有好尚勤修仁和行柔色弘四大觸類有容如此之人皆玄名題於帝籍紫字結於玉篇納元啓於神圖德尚顯於合仙內則感太極鑒映外則總大匠之宗功蒲道僃則自然白日升天髙聖帝君曰後學之人或有皮好而望仙朝勤而暮怠內希騰舉外重榮利或形謹而心放或心勤而口慢或學不弘博攻伐師宗形論萬物毀賢嫉聖愛彼憎此𠕏弱朋強或嗜酒耽色亡神喪精或遇經不盟𥨱看祕隱輕减靈密以示非類傳不關告五嶽無盟皆為宣泄犯考四明如此之人徒有仙相名書帝篇行乖本根更招考罰上纍七祖罪滅其身永失仙道長充鬼役輪轉五苦痛念何言髙聖仙禁七傷之法凡學士玄紀有名身有仙相自然合真而心不堅正者七敗傷之第一之傷帶真行僞媱色器神耗液泄漏精光枯乾氣散魄零骨空形殘神泣窮府上聞天關真仙逺遊魔魅來干自與幽隂玄紀除名九獄結因六天相親淪苦無極豈復得仙第二之傷外形在道皮好念真而心抱隂賊凶惡素堅𩓑人否敗嫉能妬賢口美心逆面喜內瞋形論得失好結罪源毀謗同學攻訐宗根三官所記摽為惡門仙真弃置邪魅附身走作形影飛散體神故令枉橫極其惡緣考滿形滅魂沉九泉徒有玄名豈保自然第三之傷嗜酒好醉損氣喪靈五府亂潰萬神振驚魂魄飛散內外朽靈本室蕭索赤子悲鳴真仙髙逝魔精入形如此之形徒積精誠雖有玄紀竟失玉名神拘六宫身灰幽冥以此求延年焉久停第四之傷行不弘潔責人宗敬心忿口罵好為鬪競瞋喜失節性不安定氣激神散內真飛迸魄離魂遊自致災病年夀頽盡皆由於性真仙髙遊衆疾來傷雖有勤學不免斯殃望仙日悠地獄日長第五之傷或玄圖表見得受寶經或運遇靈師啓授神文而不依科盟形泄天真未經九年投剌名山使青宫有録金闕結篇便傳於人流散世間輕真泄寶考結巳身徒有玄名反纍七玄仙道髙遊身死幽泉長充鬼責萬劫不原第六之傷身履殗穢形影不香內無清虛外無蘭芳道不降真神不居房氣擾精濁靈元失光五神迸散赤子飛揚邪魔來攻內外受殃以此而學望益反傷仙真髙逝尸軀獨行淪沒不救仙胡可成第七之傷啖食含血之肉殺害供口之美羶腥充於臟腑傷生殘於非已真氣擾於靈門遊魂駭於赤子魂魄逝於宫宅穢濁纒於口齒仙真遠棄於雲霄巳身沉頓於地裏徒有玄名帝簡終不免於形死髙聖帝君曰為學之本當以七傷為急既得瞻盼洞門披覩玉篇不犯七傷之禁將坐待靈降白日升晨如外勤在學內有違於七傷者此將望仙而反敗期生而反亡希吉而反凶期飛而反沉靈仙遊於髙清五神散於八荒赤子號泣於中宅遊魂悲鳴於玄空故仙相有成敗上學有七傷篤尚之士熟精其真髙聖帝君曰凡有玉骨丹文列名帝圖得見七聖玄紀凡有金髓紫藏名題金札得見隱書內文凡有神竒異毛紫胞玉絡名摽上清得見白簡玉篇諸有流精紫光內映外靈寶藏金容名書玉虛得見青録之文諸有神挺應國瓊胎紫虛名題東華得見七傷撿文自無此挺靈篇不可得而妄披寶文不可得而覽也得見此文皆玄質合仙九年修行剋得飛行玄虛上升玉清也凡受七聖玄紀回天九霄白簡青録之文師弟子對齊九十日或三十日弟子賫上金七兩紫紋七十文上朱七兩詣師北向告命髙聖盟天而傳師授不盟輕泄寶文弟子受而無信窮披玉篇同被風刀之考七祖充責三塗五苦萬劫不原五帝神兵常糾漏泄明愼奉行上清玉帝七聖玄紀廽天九霄經
